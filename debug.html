<!DOCTYPE html>
<html><body>
<pre id="out">Cargando...</pre>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const FIREBASE_CONFIG = {"apiKey": "AIzaSyDfmbfEn-zKx1suo_C1qYVkvYuN5mWARjM", "authDomain": "reditos-pwa.firebaseapp.com", "projectId": "reditos-pwa", "storageBucket": "reditos-pwa.firebasestorage.app", "messagingSenderId": "350803322044", "appId": "1:350803322044:web:6cf34623aed7670c9d1cb9"};
firebase.initializeApp(FIREBASE_CONFIG);
firebase.auth().signInAnonymously().then(() => {
  firebase.firestore().collection('r_datos').get().then(snap => {
    let out = '';
    snap.forEach(doc => {
      out += 'DOC: ' + doc.id + '\n';
      const d = doc.data();
      out += 'Prestamos: ' + (d.prestamos ? d.prestamos.length : 0) + '\n';
      out += 'Historial: ' + (d.historial ? d.historial.length : 0) + '\n';
      if (d.prestamos) {
        d.prestamos.forEach(p => {
          out += JSON.stringify(p) + '\n';
        });
      }
    });
    document.getElementById('out').textContent = out || 'Sin datos o acceso denegado';
  }).catch(e => document.getElementById('out').textContent = 'Error: ' + e.message);
}).catch(e => document.getElementById('out').textContent = 'Auth Error: ' + e.message);
</script>
</body></html>
